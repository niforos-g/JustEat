<!--
This is the html file to run the application of finding JustEat restaurants.
Simply open it with any browser of your choice, after starting the proxy (node_proxy.js). 
More information, together with the valid postal codes on the README file.
-->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Just Eat Restaurants</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 800px;
        margin: 40px auto;
        padding: 0 20px;
      }

      h1 { color: #ff8000; }<!-- simulate color of JustEat-->

      input[type="text"] {
        padding: 8px 12px;
        font-size: 16px;
        width: 200px;
        height: 38px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
      }

      button {
        padding: 8px 16px;
        font-size: 16px;
        height: 38px;
        background-color: #ff8000;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        margin-left: 8px;
        box-sizing: border-box;
      }

      button:hover { background-color: #e67300; }

      .options { margin: 16px 0; }
      .options label { margin-right: 16px; font-size: 15px; }

      #error { color: red; margin-top: 8px; }

      .card {
        border: 1px solid #ddd;
        border-radius: 6px;
        padding: 16px;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .card img {
        width: 60px;
        height: 60px;
        object-fit: contain;
        border-radius: 4px;
        flex-shrink: 0;
      }

      .card-info { flex: 1; }

      .card h3 { margin: 0 0 8px 0; color: #ff8000; }
      .card p { margin: 4px 0; }
    </style>
  </head>
  <body>
    <h1>JustEat Restaurant Finder</h1>

    <!-- Create the postal code search bar -->
     
    <div>
      <input type="text" id="postcode" placeholder="Enter postcode e.g. SW1A 1AA" />
      <button id="searchBtn">Search</button>
    </div>

    
    <div id="error"></div>
    <div id="results"></div>

    <script src="app.js"></script>
  </body>
</html>
